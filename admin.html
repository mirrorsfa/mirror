<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日记账 · 管理后台</title>
  <link rel="stylesheet" href="assets/admin/admin.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <a class="admin-brand" href="admin.html"><span>今</span><strong>今日记账</strong></a>
      <small>ADMIN CONSOLE</small>
      <nav><a class="active" href="#users">用户管理</a><a href="index.html">返回用户端</a></nav>
      <button id="adminLogout" type="button">退出管理后台</button>
    </aside>
    <main class="admin-main">
      <header><div><p>系统管理</p><h1>用户管理</h1><span>查看用户状态、使用情况与权限</span></div><div class="admin-profile" id="adminProfile">未登录</div></header>
      <section class="admin-stats">
        <article><span>注册用户</span><strong id="totalUsers">0</strong></article>
        <article><span>正常用户</span><strong id="activeUsers">0</strong></article>
        <article><span>管理员</span><strong id="adminUsers">0</strong></article>
        <article><span>总流水数</span><strong id="totalTransactions">0</strong></article>
      </section>
      <section class="admin-panel" id="users">
        <div class="admin-panel-heading"><div><h2>全部用户</h2><p>停用用户后，其现有登录会立即失效</p></div><input id="adminUserSearch" type="search" placeholder="搜索邮箱或昵称"></div>
        <div class="user-table">
          <div class="user-table-head"><span>用户</span><span>角色</span><span>状态</span><span>使用情况</span><span>注册时间</span><span>操作</span></div>
          <div id="adminUserList"></div>
        </div>
        <div class="admin-empty" id="adminEmpty" hidden>没有找到用户。</div>
      </section>
    </main>
  </div>

  <dialog class="admin-login" id="adminLoginDialog">
    <form id="adminLoginForm" autocomplete="off">
      <div class="admin-login-top"><div><small>SECURE ACCESS</small><h2>管理员登录</h2></div><button id="closeAdminLogin" type="button" aria-label="关闭">×</button></div>
      <p>该入口仅对已授权管理员开放。</p>
      <label><span>邮箱</span><input id="adminEmail" type="email" value="" autocomplete="off" required></label>
      <label><span>密码</span><input id="adminPassword" type="password" value="" autocomplete="off" minlength="8" required></label>
      <div class="admin-error" id="adminLoginError" hidden></div>
      <button class="admin-primary" id="adminLoginSubmit" type="submit">登录管理后台</button>
    </form>
  </dialog>

  <div class="admin-toast" id="adminToast"></div>
  <script type="module" src="assets/admin/admin.js"></script>
</body>
</html>
